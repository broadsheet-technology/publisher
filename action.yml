name: Publisher
description: Build, publish, and delete GHCR container image tags.

inputs:
  github-token:
    description: Token used for GHCR login and tag deletion.
    required: true
  image:
    description: Full GHCR image name without a tag, for example ghcr.io/broadsheet-technology/my-service.
    required: true
  tags:
    description: Optional newline- or comma-separated raw tag names to publish.
    required: false
    default: ""
  delete-tags:
    description: Optional newline- or comma-separated tags to delete from GHCR.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Plan image tags
      id: plan
      shell: bash
      env:
        IMAGE: ${{ inputs.image }}
        TAGS: ${{ inputs.tags }}
        DELETE_TAGS: ${{ inputs.delete-tags }}
      run: ${{ github.action_path }}/scripts/plan-tags.sh

    - name: Set up QEMU
      if: steps.plan.outputs.publish == 'true'
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64

    - name: Set up Docker Buildx
      if: steps.plan.outputs.publish == 'true'
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      if: steps.plan.outputs.publish == 'true'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.github-token }}

    - name: Build and publish image
      if: steps.plan.outputs.publish == 'true'
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile
        push: true
        platforms: linux/arm64
        tags: ${{ steps.plan.outputs.tags }}

    - name: Delete GHCR tags
      if: steps.plan.outputs.delete == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        IMAGE: ${{ inputs.image }}
        DELETE_TAGS: ${{ steps.plan.outputs.delete_tags }}
      run: |
        set -euo pipefail

        if [[ "$IMAGE" != ghcr.io/* ]]; then
          echo "::error::delete-tags currently supports GHCR images only."
          exit 1
        fi

        image_path="${IMAGE#ghcr.io/}"
        owner="${image_path%%/*}"
        package="${image_path#*/}"
        encoded_package="$(jq -rn --arg value "$package" '$value|@uri')"

        versions_path="/orgs/$owner/packages/container/$encoded_package/versions"

        while IFS= read -r tag; do
          [ -z "$tag" ] && continue

          ids="$(gh api "$versions_path" --paginate --jq ".[] | select(.metadata.container.tags[]? == \"$tag\") | .id" || true)"
          if [ -z "$ids" ]; then
            echo "::notice::No GHCR package version found for $IMAGE:$tag"
            continue
          fi

          while IFS= read -r id; do
            [ -z "$id" ] && continue
            gh api --method DELETE "$versions_path/$id"
            echo "::notice::Deleted GHCR package version $id for $IMAGE:$tag"
          done <<< "$ids"
        done <<< "$DELETE_TAGS"
